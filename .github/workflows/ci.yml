name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Lint (ruff)
        run: uv run --locked ruff check .

      - name: Format check (black)
        run: uv run --locked black --check .

      - name: Run tests
        run: uv run --locked pytest
